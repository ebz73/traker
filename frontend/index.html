    <script>
      (function() {
        var stored = localStorage.getItem('traker_theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0f1117' : '#6c3ff5');

        var tabParam = '';
        try {
          tabParam = (new URLSearchParams(window.location.search).get('tab') || '').toLowerCase();
        } catch (e) { /* URLSearchParams unavailable — fall through to default */ }
        var bootTab = (tabParam === 'droplist' || tabParam === 'emailsettings') ? tabParam : 'home';
        document.documentElement.setAttribute('data-boot-tab', bootTab);
      })();
    </script>
    <style>
      /* ---- base + theme ---- */
      .boot-shell {
        position: fixed;
        inset: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;

      }

      /* ---- skeleton + shimmer ---- */
      .boot-skel {
        position: relative;
        overflow: hidden;
        background: #e8eef9;
        border-radius: 6px;
      }
      [data-theme="dark"] .boot-skel { background: #282c3a; }
      .boot-skel::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.65) 50%, transparent 100%);
        transform: translateX(-100%);
        animation: boot-shimmer 1.5s ease-in-out infinite;
      }
      [data-theme="dark"] .boot-skel::after {
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
      }
      @keyframes boot-shimmer { to { transform: translateX(100%); } }
      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }

      /* ---- topbar ---- */
      .boot-topbar {
        flex: 0 0 auto;

        display: flex;
        align-items: center;
        justify-content: center;
        animation: boot-pulse 1.5s ease-in-out infinite;

      .boot-brand { width: 130px; height: 26px; }
      .boot-nav { display: none; margin-left: auto; }
      .boot-nav-item { width: 96px; height: 44px; border-radius: 14px; }
      .boot-avatar { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; }

      /* ---- main + tab switching ---- */
      .boot-main {
        flex: 1 1 auto;
        overflow: hidden;
        padding: 12px 12px 90px;

      .boot-content { display: none; }
      [data-boot-tab="home"] .boot-content-home,

        box-shadow: none;
      }

      /* ---- home layout ---- */
      .boot-stat-row { display: grid; grid-template-columns: 1fr; gap: 12px; }
      .boot-stat-card {
        background: #ffffff;
        border: 1px solid #cad6e8;

      .boot-product-card { display: grid; gap: 14px; }

        .boot-product-head-left { flex: 1; min-width: 0; }
        .boot-product-head-actions { align-self: flex-start; }
        .boot-product-primary-btn { width: 240px; }

        .boot-nav { display: flex; align-items: center; gap: 10px; }
        .boot-mobile-nav { display: none; }
        .boot-main { padding-bottom: 18px; }
      }

      /* ---- reduced motion ---- */
      @media (prefers-reduced-motion: reduce) {
        .boot-logo { animation: none; }
        .boot-skel::after { animation: none; display: none; }
      }
